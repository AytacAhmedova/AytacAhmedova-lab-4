<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 250px;
  }

  img {
    width: 100%;
  }

  .price {
    color: green;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="card">
  <img src="iphone.jpg" alt="iphone">
  <h3>iPhone 13</h3>
  <p class="price">1200 AZN</p>
</div>

</body>
</html>
