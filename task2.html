<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Design</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #eee;
  }

  .container {
    width: 500px;
    height: 300px;
    background: red;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .boxes {
    display: flex;
    gap: 20px;
  }

  .box {
    width: 50px;
    height: 50px;
    background: turquoise;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  <div class="boxes">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>
</div>

</body>
</html>
